<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groepsleiding Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Groepsleiding Tool</h1>
            <p>Sleep leiders naar hun groepen optimaliseer de gemiddelde score</p>
        </header>

        <!-- File Upload Section -->
        <section class="upload-section">
            <div class="upload-box">
                <input type="file" id="fileInput" accept=".xlsx,.xls" />
                <label for="fileInput">
                    <span>📁 Klik hier of sleep Excel bestand</span>
                </label>
                <button id="clearBtn" class="btn btn-secondary">Wissen</button>
            </div>
            <div id="uploadStatus" class="status-message"></div>
        </section>

        <!-- Stats Section -->
        <section id="statsSection" class="stats-section" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Totale leiders</span>
                    <span class="stat-value" id="totalPeople">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Toegewezen</span>
                    <span class="stat-value" id="assignedCount">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Nog toe te wijzen</span>
                    <span class="stat-value" id="unassignedCount">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Gemiddelde score</span>
                    <span class="stat-value" id="avgScore">-</span>
                </div>
            </div>
        </section>

        <!-- Main Assignment Area -->
        <div id="mainArea" style="display: none;">
            <!-- Unassigned People -->
            <section class="unassigned-section">
                <h2>📋 Nog toe te wijzen</h2>
                <div id="unassignedList" class="people-list sortable">
                    <!-- People cards will be added here -->
                </div>
            </section>

            <!-- Groups Section -->
            <section class="groups-section">
                <h2>👥Takken</h2>
                <div class="groups-grid">
                    <div id="groupsContainer">
                        <!-- Group sections will be added here -->
                    </div>
                </div>
            </section>

            <!-- Conflicts Section (Bonus) -->
            <section id="conflictsSection" class="conflicts-section" style="display: none;">
                <h2>⚠️ Conflicten</h2>
                <div id="conflictsList" class="conflicts-list">
                    <!-- Conflicts will be listed here -->
                </div>
            </section>
        </div>
    </div>

    <!-- Libraries from CDN -->
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <!-- Main Application Script -->
    <script src="script.js"></script>
</body>
</html>
